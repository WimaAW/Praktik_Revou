<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Ordered List</h1>
    <ol>
        <li>Pertama</li>
        <li type = "a">Kedua</li>
    </ol>
    <ol type="a">
        <li>Pertama</li>
        <li>Kedua</li>
    </ol>

    <hr/>

    <h1>Unordered List</h1>
    <Ul>
        <li>Pertama</li>
        <li type = "circle">Kedua</li>
    </Ul>
    <ul type="square">
        <li>Pertama</li>
        <li>Kedua</li>
    </ul>
</body>
</html>
